<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mila's Magic Mountain Vacation Vote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #333;
        }
        h1 span { font-size: 1.2em; }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option:hover { border-color: #667eea; background: #f5f3ff; }
        .option.selected { border-color: #667eea; background: #ede9fe; }
        .option input { display: none; }
        .radio-custom {
            width: 22px; height: 22px;
            border: 2px solid #ccc;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            transition: all 0.3s ease;
        }
        .option.selected .radio-custom {
            border-color: #667eea;
            background: #667eea;
        }
        .option.selected .radio-custom::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
        }
        .option-text { text-align: left; }
        .option-title { font-weight: 600; color: #333; font-size: 1.05em; }
        .option-desc { color: #888; font-size: 0.9em; margin-top: 2px; }
        .vote-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .vote-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .results { display: none; margin-top: 25px; }
        .result-bar {
            margin-bottom: 12px; text-align: left;
        }
        .result-label { font-weight: 600; color: #333; margin-bottom: 5px; }
        .bar-bg {
            background: #e0e0e0; border-radius: 8px; height: 28px; overflow: hidden; position: relative;
        }
        .bar-fill {
            height: 100%; border-radius: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 1s ease;
            display: flex; align-items: center; padding-left: 10px;
            color: white; font-weight: 600; font-size: 0.85em;
        }
        .thank-you { color: #667eea; font-weight: 600; font-size: 1.2em; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>🏔️</span> Mila's Magic Mountain <span>✨</span></h1>
        <p class="subtitle">Vote for your favorite vacation activity!</p>
        <div class="options" id="options">
            <label class="option" onclick="selectOption(this, 'rollercoasters')">
                <input type="radio" name="vote" value="rollercoasters">
                <div class="radio-custom"></div>
                <div class="option-text">
                    <div class="option-title">🎢 Roller Coasters</div>
                    <div class="option-desc">Thrill rides and adrenaline rushes</div>
                </div>
            </label>
            <label class="option" onclick="selectOption(this, 'waterrides')">
                <input type="radio" name="vote" value="waterrides">
                <div class="radio-custom"></div>
                <div class="option-text">
                    <div class="option-title">💦 Water Rides</div>
                    <div class="option-desc">Splash down and cool off</div>
                </div>
            </label>
            <label class="option" onclick="selectOption(this, 'shows')">
                <input type="radio" name="vote" value="shows">
                <div class="radio-custom"></div>
                <div class="option-text">
                    <div class="option-title">🎪 Live Shows</div>
                    <div class="option-desc">Entertainment and performances</div>
                </div>
            </label>
            <label class="option" onclick="selectOption(this, 'food')">
                <input type="radio" name="vote" value="food">
                <div class="radio-custom"></div>
                <div class="option-text">
                    <div class="option-title">🍕 Food & Treats</div>
                    <div class="option-desc">Theme park snacks and dining</div>
                </div>
            </label>
        </div>
        <button class="vote-btn" id="voteBtn" disabled onclick="submitVote()">Cast Your Vote</button>
        <p class="thank-you" id="thankYou">Thanks for voting! 🎉</p>
        <div class="results" id="results"></div>
    </div>
    <script>
        let selected = null;
        const votes = JSON.parse(localStorage.getItem('mm-votes') || '{"rollercoasters":0,"waterrides":0,"shows":0,"food":0}');
        const labels = { rollercoasters: '🎢 Roller Coasters', waterrides: '💦 Water Rides', shows: '🎪 Live Shows', food: '🍕 Food & Treats' };

        function selectOption(el, value) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selected = value;
            document.getElementById('voteBtn').disabled = false;
        }

        function submitVote() {
            if (!selected) return;
            votes[selected]++;
            localStorage.setItem('mm-votes', JSON.stringify(votes));
            document.getElementById('voteBtn').disabled = true;
            document.getElementById('thankYou').style.display = 'block';
            showResults();
        }

        function showResults() {
            const total = Object.values(votes).reduce((a, b) => a + b, 0);
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<h3 style="margin-bottom:15px;color:#333;">Current Results</h3>' +
                Object.entries(votes).map(([key, count]) => {
                    const pct = total ? Math.round(count / total * 100) : 0;
                    return `<div class="result-bar"><div class="result-label">${labels[key]}</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%">${pct}%</div></div></div>`;
                }).join('');
        }
    </script>
</body>
</html>
