<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mila's Magic Mountain Vacation Vote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #4a3f8a;
        }
        .subtitle {
            color: #777;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .option {
            background: #f4f0ff;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }
        .option:hover {
            border-color: #764ba2;
            background: #ede7ff;
            transform: translateY(-2px);
        }
        .option.selected {
            border-color: #764ba2;
            background: #764ba2;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(118,75,162,0.4);
        }
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f4f0ff;
            border-radius: 12px;
            font-size: 1.2em;
            color: #4a3f8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mila's Magic Mountain Vacation Vote</h1>
        <p class="subtitle">Pick your favorite Magic Mountain adventure!</p>
        <div class="options">
            <div class="option" onclick="select(this)">Roller Coaster Marathon</div>
            <div class="option" onclick="select(this)">Water Park Splash Day</div>
            <div class="option" onclick="select(this)">Mountain Trail Hike</div>
            <div class="option" onclick="select(this)">Campfire &amp; Stargazing Night</div>
        </div>
        <button onclick="vote()">Cast Your Vote</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        let selected = null;
        function select(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selected = el.textContent;
        }
        function vote() {
            const result = document.getElementById('result');
            if (!selected) {
                result.style.display = 'block';
                result.textContent = 'Please pick an option first!';
                return;
            }
            result.style.display = 'block';
            result.textContent = 'You voted for: ' + selected + '! Thanks for voting!';
        }
    </script>
</body>
</html>
